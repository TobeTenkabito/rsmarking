<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSMarking | 遥感影像工作站 Pro</title>

    <!-- 核心依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 引入 Leaflet.draw 的样式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        #map { height: calc(100vh - 64px); width: 100%; background: #f8fafc; }
        .sidebar-height { height: calc(100vh - 64px); }
        /* 绘图按钮激活样式 */
        .draw-btn-active { @apply ring-2 ring-indigo-600 bg-indigo-50 border-indigo-500 text-indigo-600; }
        path.vector-polygon-blend {
        mix-blend-mode: multiply;
        transition: stroke 0.2s, stroke-width 0.2s;
        }
        /* 侧边栏滚动条美化 */
        .sidebar-scroll {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(203, 213, 225, 0.5) transparent;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(203, 213, 225, 0.8);
            border-radius: 20px;
        }

        /* 交互微动效 */
        .tool-card { @apply transition-all duration-200 active:scale-[0.97] cursor-pointer; }
        .custom-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }

        /* 手风琴动画 */
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-item.active .accordion-content { max-height: 800px; }
        .accordion-item.active .chevron-icon { transform: rotate(180deg); }

        /* 复选框样式增强 */
        input[type="checkbox"] {
            @apply w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 transition-all cursor-pointer;
            appearance: none;
            -webkit-appearance: none;
            border-width: 2px;
            background-color: #fff;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 10px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-hidden">

    <!-- 顶部导航 -->
    <nav class="h-16 bg-slate-900 text-white flex items-center justify-between px-6 shadow-xl relative z-[1001]">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 002 2h1a2.5 2.5 0 012.5 2.5v.5m-9-11a9 9 0 1118 0 9 9 0 01-18 0z"></path></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight">RSMarking <span class="text-indigo-400 font-medium">Pro</span></h1>
        </div>

        <div class="flex items-center space-x-6">
            <div id="layer-counter" class="text-xs font-medium text-slate-400 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                已载入图层: 0
            </div>
            <div class="h-4 w-[1px] bg-slate-700"></div>
            <button onclick="RS.clearDatabase()" class="text-xs text-red-400 hover:text-red-300 font-medium transition-colors">
                清空数据
            </button>
        </div>
    </nav>

    <main class="flex">
        <!-- 侧边栏 -->
        <aside class="w-80 bg-white border-r border-slate-200 shadow-sm z-[1000] sidebar-height flex flex-col">

            <!-- 可滚动区域 -->
            <div class="flex-1 sidebar-scroll flex flex-col">

                <!-- 1. 矢量标注中心 -->
                <div class="bg-indigo-50/30 border-b border-indigo-100">
                    <div class="p-4 pb-2">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">矢量标注中心</p>
                    </div>

                    <div class="px-4 pb-4 space-y-3">
                        <!-- 项目选择器 -->
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-slate-500 flex items-center justify-between">
                                <span>标注项目</span>
                                <button onclick="RS.createProject()" class="text-indigo-600 hover:text-indigo-700">+ 新建项目</button>
                            </label>
                            <select id="project-selector"
                                    onchange="RS.selectProject(this.value)"
                                    class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                                <option value="">-- 请选择或创建项目 --</option>
                            </select>
                        </div>

                        <!-- 图层管理 -->
                        <div id="vector-layer-section" class="hidden space-y-2">
                            <div class="flex items-center justify-between border-t border-indigo-100 pt-3 mt-1">
                                <span class="text-[11px] font-bold text-slate-500">标注图层</span>
                                <button onclick="RS.createLayer()" class="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700 transition-colors">添加图层</button>
                            </div>

                            <!-- 矢量图层列表容器 -->
                            <div id="vector-list" class="space-y-1 max-h-40 overflow-y-auto pr-1">
                                <!-- 动态注入示例：<div class="flex items-center px-2 py-1.5 bg-white border border-slate-100 rounded">...</div> -->
                            </div>

                            <!-- 编辑过的标注工具栏 -->
                            <div id="drawing-toolbar" class="hidden border-t border-indigo-100 pt-3 mt-2">
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center space-x-2">
                                        <span class="text-[11px] font-bold text-slate-500">绘图工具箱</span>
                                        <input type="color" id="draw-color-picker" value="#4f46e5" onchange="RS.setDrawColor(this.value)" class="w-5 h-5 p-0 border-0 rounded cursor-pointer">
                                    </div>
                                    <button onclick="RS.cancelDraw(null)" class="text-[10px] text-red-500 hover:underline">取消绘制</button>
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    <!-- 事件名统一采用 handleSetDrawMode -->
                                    <button onclick="RS.setDrawMode('polygon')" class="draw-btn flex flex-col items-center justify-center p-2 bg-white border border-slate-200 rounded-lg hover:border-indigo-500 hover:text-indigo-600 transition-all text-slate-600">
                                        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2l-8 5 3 10h10l3-10-8-5z"></path></svg>
                                        <span class="text-[10px] font-medium">多边形</span>
                                    </button>
                                    <button onclick="RS.setDrawMode('rectangle')" class="draw-btn flex flex-col items-center justify-center p-2 bg-white border border-slate-200 rounded-lg hover:border-indigo-500 hover:text-indigo-600 transition-all text-slate-600">
                                        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16v12H4z"></path></svg>
                                        <span class="text-[10px] font-medium">矩形</span>
                                    </button>
                                    <button onclick="RS.setDrawMode('marker')" class="draw-btn flex flex-col items-center justify-center p-2 bg-white border border-slate-200 rounded-lg hover:border-indigo-500 hover:text-indigo-600 transition-all text-slate-600">
                                        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        <span class="text-[10px] font-medium">打点</span>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 2. 影像处理工具箱 -->
                <div class="bg-slate-50/50">
                    <div class="p-4 pb-2 border-b border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">影像处理中心</p>
                    </div>

                    <!-- 子模块 1: 波段分析 -->
                    <div class="accordion-item border-b border-slate-100">
                        <button onclick="this.parentElement.classList.toggle('active')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-100/50 transition-colors">
                            <div class="flex items-center space-x-3">
                                <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                <span class="text-xs font-bold text-slate-700">光谱处理</span>
                            </div>
                            <svg class="chevron-icon w-3 h-3 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="accordion-content bg-white">
                            <div class="p-3">
                                <button onclick="RS.openMergeModal()" class="w-full tool-card flex items-center space-x-3 p-3 rounded-xl border border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all">
                                    <div class="w-9 h-9 rounded-lg bg-indigo-100 flex items-center justify-center text-xl">🎞️</div>
                                    <div class="text-left">
                                        <p class="text-xs font-bold text-slate-700">多波段合成</p>
                                        <p class="text-[9px] text-slate-400">Band Stacking</p>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 子模块 2: 指数计算 -->
                    <div class="accordion-item active border-b border-slate-100">
                        <button onclick="this.parentElement.classList.toggle('active')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-100/50 transition-colors">
                            <div class="flex items-center space-x-3">
                                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                <span class="text-xs font-bold text-slate-700">指数计算</span>
                            </div>
                            <svg class="chevron-icon w-3 h-3 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="accordion-content bg-white">
                            <div class="p-3 space-y-2">
                                <button onclick="RS.openIndexModal('NDVI')" class="w-full tool-card flex items-center space-x-3 p-3 rounded-xl border border-emerald-100 bg-emerald-50/20 hover:border-emerald-500 transition-all">
                                    <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center text-xl shadow-lg shadow-emerald-200">🌿</div>
                                    <div class="text-left">
                                        <p class="text-xs font-bold text-emerald-700">植被差异指数 (NDVI)</p>
                                        <p class="text-[9px] text-emerald-500/70">分析地表植被覆盖度</p>
                                    </div>
                                </button>
                                <button onclick="RS.openIndexModal('NDWI')" class="w-full tool-card flex items-center space-x-3 p-3 rounded-xl border border-blue-100 bg-blue-50/20 hover:border-blue-500 transition-all">
                                    <div class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center text-xl shadow-lg shadow-blue-200">💧</div>
                                    <div class="text-left">
                                        <p class="text-xs font-bold text-blue-700">水体差异指数 (NDWI)</p>
                                        <p class="text-[9px] text-blue-500/70">增强水体特征显示</p>
                                    </div>
                                </button>
                                <button onclick="RS.openIndexModal('NDBI')" class="w-full tool-card flex items-center space-x-3 p-3 rounded-xl border border-amber-100 bg-amber-50/20 hover:border-amber-500 transition-all">
                                    <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center text-xl shadow-lg shadow-amber-200">🏗️</div>
                                    <div class="text-left">
                                        <p class="text-xs font-bold text-amber-700">建筑差异指数 (NDBI)</p>
                                        <p class="text-[9px] text-amber-500/70">提取城镇建成区范围</p>
                                    </div>
                                </button>
                                <button onclick="RS.openIndexModal('MNDWI')" class="w-full tool-card flex items-center space-x-3 p-3 rounded-xl border border-cyan-100 bg-cyan-50/20 hover:border-cyan-500 transition-all">
                                    <div class="w-10 h-10 rounded-xl bg-cyan-500 flex items-center justify-center text-xl shadow-lg shadow-cyan-200">🌊</div>
                                    <div class="text-left">
                                        <p class="text-xs font-bold text-cyan-700">改进型水体指数 (MNDWI)</p>
                                        <p class="text-[9px] text-cyan-500/70">更精准的城镇水体识别</p>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 子模块 3: 提取工具 -->
                    <div class="accordion-item border-b border-slate-100">
                        <button onclick="this.parentElement.classList.toggle('active')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-100/50 transition-colors">
                            <div class="flex items-center space-x-3">
                                <svg class="w-4 h-4 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                <span class="text-xs font-bold text-slate-700">要素提取</span>
                            </div>
                            <svg class="chevron-icon w-3 h-3 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="accordion-content bg-white">
                            <div class="p-3 space-y-2">
                                <button onclick="RS.openExtractionModal('VEGETATION')" class="w-full flex items-center justify-between px-3 py-3 bg-slate-50 hover:bg-emerald-50 border border-slate-100 hover:border-emerald-200 rounded-xl transition-all group tool-card">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center text-lg">🌿</div>
                                        <span class="text-xs font-bold text-slate-600 group-hover:text-emerald-700">植被自动提取</span>
                                    </div>
                                    <svg class="w-3 h-3 text-slate-300 group-hover:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                                <button onclick="RS.openExtractionModal('WATER')" class="w-full flex items-center justify-between px-3 py-3 bg-slate-50 hover:bg-blue-50 border border-slate-100 hover:border-blue-200 rounded-xl transition-all group tool-card">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center text-lg">💧</div>
                                        <span class="text-xs font-bold text-slate-600 group-hover:text-blue-700">水体自动提取</span>
                                    </div>
                                    <svg class="w-3 h-3 text-slate-300 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                                <button onclick="RS.openExtractionModal('BUILDING')" class="w-full flex items-center justify-between px-3 py-3 bg-slate-50 hover:bg-amber-50 border border-slate-100 hover:border-amber-200 rounded-xl transition-all group tool-card">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center text-lg">🏗️</div>
                                        <span class="text-xs font-bold text-slate-600 group-hover:text-amber-700">建筑形态提取</span>
                                    </div>
                                    <svg class="w-3 h-3 text-slate-300 group-hover:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. 影像资源列表 -->
                <div class="flex-1 p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">影像目录</h2>
                        <div class="flex items-center space-x-1">
                            <button onclick="document.getElementById('raster-upload-input').click()" title="上传 TIFF 影像" class="p-1.5 text-slate-400 hover:text-emerald-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </button>
                            <input type="file" id="raster-upload-input" class="hidden" accept=".tif,.tiff,.geotiff">
                            <button onclick="RS.fetchRasters()" title="刷新列表" class="p-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="raster-list" class="space-y-3"></div>
                    <div id="empty-hint" class="hidden py-10 text-center">
                        <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">暂无影像数据</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 地图主视口 -->
        <section class="flex-1 relative">
            <div id="map"></div>

            <!-- 全局 Loader -->
            <div id="global-loader" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md px-5 py-2.5 rounded-full shadow-2xl border border-indigo-100 z-[1001] flex items-center space-x-3">
                <div class="w-4 h-4 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-[11px] font-bold text-slate-700 uppercase tracking-[0.2em]">空间数据运算中...</span>
            </div>
        </section>
    </main>

    <!-- 弹窗容器：由 main.js 动态注入内容 -->
    <div id="modals-container"></div>
    <!-- 详情面板容器 -->
    <div id="detail-panel-container"></div>
    <!-- 脚本依赖 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script type="module" src="/client/packages/app/src/main.js"></script>
</body>
</html>
