<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSMarking Frontend Logic Unit Tests</title>
    <!-- Mocha stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
    <style>
        body { font-family: sans-serif; background: #f4f4f9; }
        #mocha { margin-left: 0; margin-right: 0; }
        #map-test-container { display: none; } /* hidden map container for tests */
    </style>
</head>
<body>
    <div id="mocha"></div>
    <div id="map-test-container"></div>

    <!-- 1. Load test framework libraries -->
    <script src="https://unpkg.com/mocha/mocha.js"></script>
    <script src="https://unpkg.com/chai/chai.js"></script>
    <!-- Load Leaflet (the test environment needs a real Leaflet object) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script type="module">
        // 2. Initialize test environment
        mocha.setup('bdd');
        const expect = chai.expect;

        // Mock global app variables
        window.__app_id = 'test-app-id';
        window.RS = { cancelDraw: () => {}, exitEditMode: () => {} };

        // 3. Import modules under test (Note: paths are relative to this HTML file)
        // Assumed path ../../client/packages/app/src/...
        import { Store } from '../../client/packages/app/src/store/index.js';
        import { AnnotationModule } from '../../client/packages/app/src/modules/AnnotationModule.js';

        // 4. Write test cases
        describe('Store state machine tests', () => {
            beforeEach(() => {
                Store.state.activeVectorLayerId = null;
                Store.state.visibleVectorLayerIds = new Set();
            });

            it('toggles layer visibility correctly', () => {
                Store.toggleVectorVisibility('layer-1');
                expect(Store.state.visibleVectorLayerIds.has('layer-1')).to.be.true;
                Store.toggleVectorVisibility('layer-1');
                expect(Store.state.visibleVectorLayerIds.has('layer-1')).to.be.false;
            });
        });

        describe('AnnotationModule interaction tests', () => {
            let map;
            before(() => {
                map = L.map('map-test-container').setView([0, 0], 10);
            });

            it('undoLastPoint calls the expected method', () => {
                const module = new AnnotationModule(map);
                const mockHandler = {
                    enabled: () => true,
                    deleteLastVertex: () => { mockHandler.called = true; },
                    called: false
                };
                module.currentHandler = mockHandler;
                module.undoLastPoint();
                expect(mockHandler.called).to.be.true;
            });
        });

        // 5. Run tests
        mocha.run();
    </script>
</body>
</html>
